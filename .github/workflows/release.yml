name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: startsWith(github.event.head_commit.message, 'Release ')
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"

          # "Release vX.X.X" — all packages with same version
          if echo "$MESSAGE" | grep -qE '^Release v[0-9]'; then
            VERSION=$(echo "$MESSAGE" | sed -n 's/Release v\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p')
            TAG="v${VERSION}"

            {
              echo "# DocumentParsers"
              echo ""
              cat RELEASENOTES.DocumentParsers.md
              echo ""
              echo "---"
              echo ""
              echo "# DocumentParsers.Pdf"
              echo ""
              cat RELEASENOTES.DocumentParsers.Pdf.md
              echo ""
              echo "---"
              echo ""
              echo "# DocumentParsers.Pdf.Ocr"
              echo ""
              cat RELEASENOTES.DocumentParsers.Pdf.Ocr.md
            } > RELEASE_BODY.md

            gh release create "$TAG" \
              --title "v${VERSION}" \
              --notes-file RELEASE_BODY.md
          else
            # "Release Name1 vX.X.X [Name2 vX.X.X ...]"
            # Extract all "Name vX.X.X" pairs
            PAIRS=$(echo "$MESSAGE" | grep -oE '[A-Za-z][A-Za-z0-9.]*\s+v[0-9]+\.[0-9]+\.[0-9]+')

            echo "$PAIRS" | while IFS= read -r pair; do
              NAME=$(echo "$pair" | awk '{print $1}')
              VERSION=$(echo "$pair" | sed 's/.*v//')
              TAG="$(echo "$NAME" | tr '[:upper:]' '[:lower:]')-v${VERSION}"

              NOTES_FILE="RELEASENOTES.${NAME}.md"
              if [ ! -f "$NOTES_FILE" ]; then
                echo "::warning::$NOTES_FILE not found, skipping $NAME"
                continue
              fi

              echo "Creating release: $NAME v$VERSION (tag: $TAG)"
              gh release create "$TAG" \
                --title "${NAME} v${VERSION}" \
                --notes-file "$NOTES_FILE"
            done
          fi

name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: startsWith(github.event.head_commit.message, 'Release ')
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          MESSAGE=$(printf '%s\n' "$COMMIT_MESSAGE" | head -n 1)

          normalize_name() {
            case "$1" in
              DocumentParsers|FieldCure.DocumentParsers)
                echo "DocumentParsers|FieldCure.DocumentParsers|RELEASENOTES.DocumentParsers.md"
                ;;
              Imaging|DocumentParsers.Imaging|FieldCure.DocumentParsers.Imaging)
                echo "DocumentParsers.Imaging|FieldCure.DocumentParsers.Imaging|RELEASENOTES.DocumentParsers.Imaging.md"
                ;;
              Ocr|DocumentParsers.Ocr|FieldCure.DocumentParsers.Ocr)
                echo "DocumentParsers.Ocr|FieldCure.DocumentParsers.Ocr|RELEASENOTES.DocumentParsers.Ocr.md"
                ;;
              Audio|DocumentParsers.Audio|FieldCure.DocumentParsers.Audio)
                echo "DocumentParsers.Audio|FieldCure.DocumentParsers.Audio|RELEASENOTES.DocumentParsers.Audio.md"
                ;;
              *)
                return 1
                ;;
            esac
          }

          if echo "$MESSAGE" | grep -qE '^Release v[0-9]'; then
            VERSION=$(echo "$MESSAGE" | sed -n 's/Release v\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p')
            TAG="v${VERSION}"

            {
              echo "# DocumentParsers"
              echo ""
              cat RELEASENOTES.DocumentParsers.md
              echo ""
              echo "---"
              echo ""
              echo "# DocumentParsers.Imaging"
              echo ""
              cat RELEASENOTES.DocumentParsers.Imaging.md
              echo ""
              echo "---"
              echo ""
              echo "# DocumentParsers.Ocr"
              echo ""
              cat RELEASENOTES.DocumentParsers.Ocr.md
              echo ""
              echo "---"
              echo ""
              echo "# DocumentParsers.Audio"
              echo ""
              cat RELEASENOTES.DocumentParsers.Audio.md
            } > RELEASE_BODY.md

            gh release create "$TAG" \
              --title "v${VERSION}" \
              --notes-file RELEASE_BODY.md
          else
            PAIRS=$(echo "$MESSAGE" | grep -oE '[A-Za-z][A-Za-z0-9.]*\s+v[0-9]+\.[0-9]+\.[0-9]+')

            echo "$PAIRS" | while IFS= read -r pair; do
              [ -z "$pair" ] && continue

              RAW_NAME=$(echo "$pair" | awk '{print $1}')
              VERSION=$(echo "$pair" | sed 's/.*v//')

              if ! META=$(normalize_name "$RAW_NAME"); then
                echo "::warning::Unknown package name '$RAW_NAME', skipping"
                continue
              fi

              SLUG=$(echo "$META" | cut -d'|' -f1)
              TITLE=$(echo "$META" | cut -d'|' -f2)
              NOTES_FILE=$(echo "$META" | cut -d'|' -f3)
              TAG="$(echo "$SLUG" | tr '[:upper:]' '[:lower:]')-v${VERSION}"

              if [ ! -f "$NOTES_FILE" ]; then
                echo "::warning::$NOTES_FILE not found, skipping $RAW_NAME"
                continue
              fi

              echo "Creating release: $TITLE v$VERSION (tag: $TAG)"
              gh release create "$TAG" \
                --title "$TITLE v${VERSION}" \
                --notes-file "$NOTES_FILE"
            done
          fi
